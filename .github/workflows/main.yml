name: AI Master Engine Auto-Update

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় একবার অটোমেটিক চলবে
  workflow_dispatch: # তুমি চাইলে নিজেও রান করতে পারবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Master Brain
        run: python master_brain.py

      - name: Run Factory to Generate Page
        run: python factory.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
